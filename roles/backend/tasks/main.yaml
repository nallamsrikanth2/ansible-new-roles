- name: disable the nodejs
  ansible.builtin.dnf:
    name: nodejs
    state: absent

- name: enable the nodejs
  ansible.builtin.command: dnf module enable nodejs:20 -y

- name: install the nodejs
  ansible.builtin.dnf:
    name: "{{item}}"
    state: latest
  loop:
  - nodejs
  - mysql

- name: create the expense login_user
  ansible.builtin.user:
    name: expense

- name: create the app directory
  ansible.builtin.file:
    path: /app
    state: directory

- name: download and unzip code
  ansible.builtin.unarchive:
    src: https://expense-builds.s3.us-east-1.amazonaws.com/expense-backend-v2.zip
    dest: /app
    remote_src: yes

- name: install the dependencies
  ansible.builtin.command: npm install
  args:
    chdir: /app

- name: copy the code
  ansible.builtin.template:
    src: backend.service.j2
    dest: /etc/systemd/system/backend.service
  
- name: deamon reload
  ansible.builtin.systemd_service:
      daemon_reload: true

- name: start and enable the backend server 
  ansible.builtin.service:
    name: backend
    state: started
    enabled: yes

- name: load the schema
  community.mysql.mysql_db:
    login_user: "{{login_user}}"
    login_password: "{{password}}"
    login_host: "{{login_host}}"
    state: import
    name: all
    target:  /app/schema/backend.sql
  notify:
    - restart server



  
